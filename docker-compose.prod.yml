services:
  postgres:
    image: postgres:16-alpine
    container_name: prdmaker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prdmaker
    volumes:
      - prdmaker_pgdata:/var/lib/postgresql/data
    # No host port exposed in prod — only the in-network services connect.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prdmaker"]
      interval: 5s
      timeout: 5s
      retries: 20

  next:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prdmaker-next
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"

  collab:
    build:
      context: ./apps/collab
      dockerfile: Dockerfile
    container_name: prdmaker-collab
    restart: unless-stopped
    env_file:
      - apps/collab/.env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "1234"

  nginx:
    image: nginx:1.27-alpine
    container_name: prdmaker-nginx
    restart: unless-stopped
    depends_on:
      - next
      - collab
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/prdmaker-ip.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  prdmaker_pgdata:

services:
  postgres:
    image: postgres:16-alpine
    container_name: prdmaker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prdmaker
    volumes:
      - prdmaker_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prdmaker"]
      interval: 5s
      timeout: 5s
      retries: 20

  next:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prdmaker-next
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"

  collab:
    build:
      context: ./apps/collab
      dockerfile: Dockerfile
    container_name: prdmaker-collab
    restart: unless-stopped
    env_file:
      - apps/collab/.env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "1234"

  nginx:
    image: nginx:1.27-alpine
    container_name: prdmaker-nginx
    restart: unless-stopped
    depends_on:
      - next
      - collab
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Generated by scripts/prod-docker.sh (http or https variant).
      - ./deploy/nginx/prdmaker.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    # Reload every 6h so renewed Let's Encrypt certs (from certbot service)
    # get picked up without manual intervention.
    entrypoint: /bin/sh -c
    command:
      - |
        (while :; do sleep 6h; nginx -s reload 2>/dev/null || true; done) &
        exec nginx -g 'daemon off;'

  # Auto-renew Let's Encrypt certs every 12h. First-time acquisition is
  # driven by scripts/prod-docker.sh via `docker compose run --rm certbot`.
  certbot:
    image: certbot/certbot:latest
    container_name: prdmaker-certbot
    restart: unless-stopped
    depends_on:
      - nginx
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c
    command:
      - |
        trap exit TERM
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet
          sleep 12h & wait $${!}
        done

volumes:
  prdmaker_pgdata:
  certbot_certs:
  certbot_www:

services:
  postgres:
    image: postgres:16-alpine
    container_name: prdmaker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prdmaker
    ports:
      - "5432:5432"
    volumes:
      - prdmaker_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prdmaker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  prdmaker_pgdata:

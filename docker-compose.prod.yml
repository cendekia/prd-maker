services:
  postgres:
    image: postgres:16-alpine
    container_name: prdmaker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prdmaker
    volumes:
      - prdmaker_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prdmaker"]
      interval: 5s
      timeout: 5s
      retries: 20

  next:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prdmaker-next
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    # Bound to the loopback only — internet reaches the app via Caddy or
    # the optional nginx-profile service below, never directly.
    ports:
      - "127.0.0.1:3000:3000"

  collab:
    build:
      context: ./apps/collab
      dockerfile: Dockerfile
    container_name: prdmaker-collab
    restart: unless-stopped
    env_file:
      - apps/collab/.env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:1234:1234"

  # Optional in-Docker edge — only started when the `edge-nginx` profile is
  # active (scripts/prod-docker.sh enables it when host Caddy isn't available).
  nginx:
    profiles: ["edge-nginx"]
    image: nginx:1.27-alpine
    container_name: prdmaker-nginx
    restart: unless-stopped
    depends_on:
      - next
      - collab
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/prdmaker.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    entrypoint: /bin/sh -c
    command:
      - |
        (while :; do sleep 6h; nginx -s reload 2>/dev/null || true; done) &
        exec nginx -g 'daemon off;'

  certbot:
    profiles: ["edge-nginx"]
    image: certbot/certbot:latest
    container_name: prdmaker-certbot
    restart: unless-stopped
    depends_on:
      - nginx
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c
    command:
      - |
        trap exit TERM
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet
          sleep 12h & wait $${!}
        done

volumes:
  prdmaker_pgdata:
  certbot_certs:
  certbot_www:
